<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />

    <title>山河桥语 - 中国古代桥梁时空数据可视化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        #app {
            height: 100vh;
            width: 100vw;
        }
        
        /* 临时调试面板 */
        #debug {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 8px;
            border-radius: 4px;
            z-index: 9999;
            pointer-events: none;
        }

</head>
<body>
    <div id="app"></div>
    <div id="debug">加载中...</div>
    
    <script>
        // 调试脚本，检查文件是否能加载
        const debugDiv = document.getElementById('debug');
        
        // 检查 CSS 是否能加载
        const cssLink = document.createElement('link');
        cssLink.rel = 'stylesheet';
        cssLink.href = '/1/assets/index-5ae3e8da.css';
        cssLink.onload = () => debugDiv.innerHTML = '✅ CSS 加载成功';
        cssLink.onerror = () => debugDiv.innerHTML = '❌ CSS 加载失败: /1/assets/index-5ae3e8da.css';
        document.head.appendChild(cssLink);
    </script>
    
    <script type="module" crossorigin src="/1/assets/index-49c0ef96.js"></script>
